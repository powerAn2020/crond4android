<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crond4Android</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body class="theme-dark">
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel main-header">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <h1>Crond<span class="highlight"> For Android</span></h1>
            </div>
            <div class="header-actions">
                <div class="status-badge" id="statusBadge">
                    <div class="status-dot" id="statusDot"></div>
                    <span class="status-text" id="statusText" data-i18n="statusChecking">正在检查...</span>
                </div>
                <div class="action-group">
                    <button class="btn btn-icon btn-ghost" id="btnTheme" title="切换主题">
                        <!-- Default Moon Icon -->
                        <svg class="theme-icon moon-icon" viewBox="0 0 24 24" width="18" height="18"
                            stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <svg class="theme-icon sun-icon" style="display: none;" viewBox="0 0 24 24" width="18"
                            height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                            stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                    <button class="btn btn-icon btn-ghost lang-btn" id="btnLang" title="Switch Language">
                        EN
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <main class="content-grid">
            <!-- Left Panel: Crontab Editor -->
            <section class="glass-panel editor-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2 data-i18n="configTitle">Crontab 配置</h2>
                    </div>
                    <button class="btn btn-primary" id="btnSaveConfig" disabled>
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        <span data-i18n="btnSave">保存配置</span>
                    </button>
                </div>
                <div class="editor-container">
                    <textarea id="crontabEditor" autocomplete="off" spellcheck="false"
                        data-i18n-placeholder="configPlaceholder" placeholder="正在加载配置文件..."></textarea>
                </div>
                <div class="panel-footer">
                    <small class="muted-text" data-i18n="configHint">编辑后需点击保存，并建议重启进程使其立即生效。</small>
                </div>
            </section>

            <!-- Right Panel: Logs -->
            <section class="glass-panel log-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2 data-i18n="logTitle">运行日志</h2>
                        <span class="badge">run.log</span>
                    </div>
                    <div class="action-group">
                        <button class="btn btn-icon btn-ghost" id="btnRefreshLog" title="刷新日志">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                                fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                        </button>
                        <button class="btn btn-outline btn-danger" id="btnClearLog" data-i18n="btnClearLog">清空</button>
                    </div>
                </div>
                <div class="log-container">
                    <pre id="logViewer" data-i18n="logLoading">正在读取日志...</pre>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notifications (Dynamic) -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
